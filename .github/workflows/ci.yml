name: iOS CI

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v2
      with:
        xcode-version: '17'
    - name: Build and Test
      run: xcodebuild test -scheme "EnExpertiseApp" -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0'
